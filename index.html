<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সম্মিলিত সমৃদ্ধি | ঐক্যবদ্ধ অগ্রযাত্রা</title>
    <meta name="referrer" content="no-referrer-when-downgrade">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-header { background: linear-gradient(135deg, #064e3b 0%, #059669 100%); }
        .tab-active { background: white !important; color: #064e3b !important; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        @media print { 
            .no-print { display: none !important; } 
            #receipt-modal { position: static; background: white; display: block !important; box-shadow: none; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <header class="gradient-header text-white shadow-xl no-print">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-white p-1 rounded-xl shadow-lg">
                    <img src="https://rjlopdcbqsqzhjkiqmwv.supabase.co/storage/v1/object/public/assets/641041046_877949485299102_1068984859608942574_n.jpg" alt="Logo" class="h-12 w-auto" onerror="this.src='https://placehold.co/100x100?text=LOGO'">
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-black tracking-tight leading-none uppercase">সম্মিলিত সমৃদ্ধি</h1>
                    <p class="text-[10px] opacity-90 font-bold uppercase tracking-widest mt-1">ঐক্যবদ্ধ অগ্রযাত্রা</p>
                </div>
            </div>
            <div id="nav-actions" class="hidden"><button onclick="location.reload()" class="bg-red-500 hover:bg-red-600 px-5 py-2 rounded-full text-xs font-bold transition-all uppercase">লগআউট</button></div>
        </div>
    </header>

    <div id="login-screen" class="min-h-[80vh] flex items-center justify-center p-4 no-print">
        <div class="glass-card p-8 rounded-[2rem] shadow-2xl w-full max-w-md border border-white">
            <div class="flex gap-2 mb-8 bg-slate-100 p-1.5 rounded-2xl font-bold">
                <button onclick="toggleLoginMode('member')" id="m-btn" class="flex-1 py-3 rounded-xl tab-active uppercase">সদস্য</button>
                <button onclick="toggleLoginMode('admin')" id="a-btn" class="flex-1 py-3 rounded-xl text-slate-500 uppercase">এডমিন</button>
            </div>
            <div class="space-y-5">
                <input type="text" id="user-id" placeholder="আইডি" class="w-full p-4 border rounded-2xl outline-none bg-slate-50 uppercase font-bold">
                <input type="password" id="user-pass" placeholder="পিন নম্বর" class="w-full p-4 border rounded-2xl outline-none bg-slate-50">
                <button onclick="handleAuth()" class="w-full bg-emerald-900 text-white py-4 rounded-2xl font-black shadow-xl hover:bg-emerald-800 transition-all uppercase tracking-widest">লগইন</button>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="hidden no-print">
        <main class="container mx-auto p-4 space-y-6">
            <div id="admin-summary-cards" class="grid grid-cols-1 md:grid-cols-3 gap-5"></div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-100">
                    <h3 class="font-bold mb-4 text-emerald-800 uppercase text-xs tracking-wider"><i class="fas fa-users mr-2"></i>সদস্য তালিকা</h3>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="new-id" placeholder="ID" class="w-20 p-3 border rounded-xl text-sm uppercase font-bold">
                        <input type="text" id="new-name" placeholder="নাম" class="flex-1 p-3 border rounded-xl text-sm">
                        <input type="text" id="new-pin" placeholder="পিন" class="w-20 p-3 border rounded-xl text-sm">
                        <button onclick="addNewMember()" class="bg-emerald-900 text-white px-4 rounded-xl font-bold">যোগ</button>
                    </div>
                    <div id="admin-member-list" class="max-h-60 overflow-y-auto space-y-2"></div>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-100">
                    <h3 class="font-bold mb-4 text-emerald-800 uppercase text-xs tracking-wider"><i class="fas fa-plus-circle mr-2"></i>নতুন লেনদেন</h3>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="tx-member-id" placeholder="আইডি" class="p-3 border rounded-xl bg-slate-50 uppercase font-bold">
                            <input type="number" id="tx-amount" placeholder="পরিমাণ" class="p-3 border rounded-xl bg-slate-50 font-black">
                        </div>
                        <select id="tx-type" class="w-full p-3 border rounded-xl bg-slate-50 font-bold">
                            <option value="Deposit">সঞ্চয় জমা</option>
                            <option value="Withdrawal">খরচ/উত্তোলন</option>
                        </select>
                        <input type="text" id="tx-comment" placeholder="মন্তব্য" class="w-full p-3 border rounded-xl bg-slate-50">
                        <button onclick="saveTx()" class="w-full bg-emerald-900 text-white py-4 rounded-xl font-bold shadow-lg uppercase tracking-widest">সেভ ও রিসিট</button>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
                <div class="bg-slate-100 p-4 font-bold text-xs uppercase tracking-widest text-emerald-900">সাম্প্রতিক লেনদেন (আইডি ও নাম সহ)</div>
                <div id="admin-tx-history" class="divide-y max-h-96 overflow-y-auto"></div>
            </div>
        </main>
    </div>

    <div id="member-panel" class="hidden no-print">
        <main class="container mx-auto p-4 space-y-6">
            <h2 id="m-welcome" class="text-xl font-black text-emerald-900 uppercase"></h2>
            <div id="member-summary-cards" class="grid grid-cols-1 md:grid-cols-3 gap-5"></div>
            <div id="member-tx-history" class="bg-white rounded-[2rem] shadow-sm border divide-y overflow-hidden"></div>
        </main>
    </div>

    <div id="receipt-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-[9999]">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full border-t-8 border-emerald-900">
            <div class="text-center mb-6">
                <h2 class="font-black text-2xl uppercase tracking-tighter">Money Receipt</h2>
                <p class="text-[9px] uppercase tracking-widest font-bold opacity-60">সম্মিলিত সমৃদ্ধি</p>
            </div>
            <div id="receipt-details" class="space-y-3 text-sm font-medium border-y py-4 my-4"></div>
            <div class="flex gap-3 no-print">
                <button onclick="window.print()" class="flex-1 bg-emerald-900 text-white py-3 rounded-xl font-bold uppercase text-xs">Print</button>
                <button onclick="document.getElementById('receipt-modal').classList.add('hidden')" class="flex-1 bg-slate-100 py-3 rounded-xl font-bold uppercase text-xs">Close</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://rjlopdcbqsqzhjkiqmwv.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqbG9wZGNicXNxemhqa2lxbXd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTk0MzEsImV4cCI6MjA5MDg5NTQzMX0.7K8sQc8SFiGDMYdAdcF6zen9pEfWq3DgixdQ9elFN18'; 
        const _db = supabase.createClient(SB_URL, SB_KEY);

        let currentMode = 'member', loggedUser = null;

        function toggleLoginMode(m) {
            currentMode = m;
            document.getElementById('m-btn').className = (m === 'member') ? 'flex-1 py-3 rounded-xl tab-active transition-all uppercase' : 'flex-1 py-3 rounded-xl text-slate-500 uppercase';
            document.getElementById('a-btn').className = (m === 'admin') ? 'flex-1 py-3 rounded-xl tab-active transition-all uppercase' : 'flex-1 py-3 rounded-xl text-slate-500 uppercase';
        }

        async function handleAuth() {
            const id = document.getElementById('user-id').value.trim().toUpperCase();
            const pass = document.getElementById('user-pass').value.trim();
            if(currentMode === 'admin') {
                if(pass === '1234') { showPanel('admin'); refreshAdminDashboard(); }
                else alert("ভুল এডমিন পিন!");
            } else {
                const { data } = await _db.from('profiles').select('*').eq('id', id).eq('pin', pass).single();
                if(data) { loggedUser = data; showPanel('member'); loadMemberDashboard(); }
                else alert("আইডি বা পিন ভুল!");
            }
        }

        function showPanel(t) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-panel').classList.toggle('hidden', t !== 'admin');
            document.getElementById('member-panel').classList.toggle('hidden', t !== 'member');
            document.getElementById('nav-actions').classList.remove('hidden');
        }

        async function refreshAdminDashboard() {
            const { data: txData } = await _db.from('transactions').select('amount, type');
            let inc = 0, exp = 0;
            txData?.forEach(t => { if(t.type === 'Deposit') inc += Number(t.amount); else exp += Number(t.amount); });
            document.getElementById('admin-summary-cards').innerHTML = renderCards(inc, exp);
            
            const { data: mems } = await _db.from('profiles').select('*').order('id');
            document.getElementById('admin-member-list').innerHTML = mems?.map(m => `
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border">
                    <div class="text-xs font-bold">${m.id} | ${m.full_name} <p class="text-emerald-700">৳${Number(m.balance).toLocaleString()}</p></div>
                    <button onclick="deleteMember('${m.id}')" class="text-red-400 p-1"><i class="fas fa-trash"></i></button>
                </div>`).join('') || '';

            // এখানে Profiles টেবিল থেকে নাম নিয়ে আসার জন্য Foreign Key জয়েন ব্যবহার করা হয়েছে
            const { data: txs } = await _db.from('transactions').select('*, profiles(full_name)').order('created_at', {ascending: false});
            
            document.getElementById('admin-tx-history').innerHTML = txs?.map(t => `
                <div class="flex justify-between p-4 text-xs border-b">
                    <div>
                        <b class="text-emerald-900">${t.member_id} | ${t.profiles ? t.profiles.full_name : 'N/A'}</b>
                        <p class="opacity-50 text-[10px] mt-1 italic">${new Date(t.created_at).toLocaleDateString('bn-BD')} - ${t.comment || 'no comment'}</p>
                    </div>
                    <div class="font-black ${t.type === 'Deposit' ? 'text-emerald-600' : 'text-red-600'}">৳${Number(t.amount).toLocaleString()}</div>
                </div>`).join('') || '<p class="p-4 text-center opacity-50">কোন লেনদেন নেই</p>';
        }

        async function saveTx() {
            const mId = document.getElementById('tx-member-id').value.trim().toUpperCase();
            const amt = parseFloat(document.getElementById('tx-amount').value);
            const type = document.getElementById('tx-type').value;
            const comment = document.getElementById('tx-comment').value;

            if(!mId || isNaN(amt)) return alert("সঠিক ডাটা দিন!");

            const { data: memberProfile } = await _db.from('profiles').select('full_name').eq('id', mId).single();
            if(!memberProfile) return alert("এই আইডির কোনো সদস্য পাওয়া যায়নি!");

            const { error } = await _db.from('transactions').insert([{ member_id: mId, amount: amt, type, comment }]);
            
            if(!error) {
                const { data: p } = await _db.from('profiles').select('balance').eq('id', mId).single();
                let newBal = (type === 'Deposit') ? (Number(p.balance) + amt) : (Number(p.balance) - amt);
                await _db.from('profiles').update({ balance: newBal }).eq('id', mId);
                
                showReceipt(mId, memberProfile.full_name, amt, type, comment);
                refreshAdminDashboard();
                
                document.getElementById('tx-member-id').value = '';
                document.getElementById('tx-amount').value = '';
                document.getElementById('tx-comment').value = '';
            } else {
                alert("লেনদেন সেভ করতে সমস্যা হয়েছে!");
            }
        }

        function showReceipt(mId, memberName, amt, type, comment) {
            const details = `
                <div class="flex justify-between py-2 border-b border-dashed"><span>নাম:</span> <b>${memberName}</b></div>
                <div class="flex justify-between py-2"><span>আইডি:</span> <b>${mId}</b></div>
                <div class="flex justify-between py-2"><span>পরিমাণ:</span> <b class="text-lg text-emerald-800">৳${amt.toLocaleString()}</b></div>
                <div class="flex justify-between py-2"><span>ধরণ:</span> <b>${type === 'Deposit' ? 'সঞ্চয় জমা' : 'উত্তোলন/খরচ'}</b></div>
                <div class="flex justify-between py-2"><span>মন্তব্য:</span> <b>${comment || 'N/A'}</b></div>
                <div class="flex justify-between py-2 text-[10px] opacity-50"><span>সময়:</span> ${new Date().toLocaleString('bn-BD')}</div>
            `;
            document.getElementById('receipt-details').innerHTML = details;
            document.getElementById('receipt-modal').classList.remove('hidden');
        }

        async function addNewMember() {
            const id = document.getElementById('new-id').value.trim().toUpperCase();
            const name = document.getElementById('new-name').value.trim();
            const pin = document.getElementById('new-pin').value.trim();
            if(!id || !name || !pin) return alert("সব ঘর পূরণ করুন!");
            const { error } = await _db.from('profiles').insert([{ id, full_name: name, pin, balance: 0 }]);
            if(!error) refreshAdminDashboard(); else alert("আইডিটি সম্ভবত ইতিমধ্যে ব্যবহৃত!");
        }

        async function loadMemberDashboard() {
            document.getElementById('m-welcome').innerText = `সদস্য: ${loggedUser.full_name}`;
            const { data: txs } = await _db.from('transactions').select('*').eq('member_id', loggedUser.id).order('created_at', {ascending: false});
            let inc = 0, exp = 0;
            txs?.forEach(t => { if(t.type === 'Deposit') inc += Number(t.amount); else exp += Number(t.amount); });
            document.getElementById('member-summary-cards').innerHTML = renderCards(inc, exp);
            document.getElementById('member-tx-history').innerHTML = txs?.map(t => `
                <div class="p-4 flex justify-between border-b">
                    <div>
                        <span class="font-bold">${t.type === 'Deposit' ? 'সঞ্চয়' : 'খরচ'}</span>
                        <p class="text-[10px] opacity-50 italic">${t.comment || ''}</p>
                    </div>
                    <span class="font-bold">৳${Number(t.amount).toLocaleString()}</span>
                </div>`).join('') || '<p class="p-4 text-center opacity-50">কোন লেনদেন নেই</p>';
        }

        function renderCards(inc, exp) {
            return `
                <div class="bg-white p-6 rounded-2xl border-b-4 border-emerald-500 shadow-sm">
                    <p class="text-[10px] font-bold opacity-50 uppercase">সঞ্চয়</p>
                    <h2 class="text-2xl font-black">৳${inc.toLocaleString()}</h2>
                </div>
                <div class="bg-white p-6 rounded-2xl border-b-4 border-red-500 shadow-sm">
                    <p class="text-[10px] font-bold opacity-50 uppercase">খরচ</p>
                    <h2 class="text-2xl font-black">৳${exp.toLocaleString()}</h2>
                </div>
                <div class="bg-emerald-900 text-white p-6 rounded-2xl shadow-xl border-b-4 border-emerald-400">
                    <p class="text-[10px] font-bold opacity-70 uppercase">অবশিষ্ট ফান্ড</p>
                    <h2 class="text-2xl font-black">৳${(inc - exp).toLocaleString()}</h2>
                </div>`;
        }

        async function deleteMember(id) { if(confirm("মুছে ফেলবেন?")) { await _db.from('profiles').delete().eq('id', id); refreshAdminDashboard(); } }
    </script>
</body>
</html>
